{% extends "layout.html" %}

{% block title %}Sign Up | Wolf Central{% endblock %}

{% block content %}
<div class="form-container">
  <h2>Create Your Student Account</h2>

  {% if message %}
  <p style="color: #007bff; font-weight: bold;">{{ message }}</p>
  {% endif %}

  <form action="signup.php" method="post" class="student-form">
    <div class="form-group">
      <label for="student_id">Student ID Number</label>
      <input type="text" id="student_id" name="student_id" required>
    </div>
    <div class="form-group">
      <label for="email">University Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group password-group">
      <label for="password">Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" name="password" required>
        <button type="button" class="toggle-password" onclick="togglePassword()">Show</button>
      </div>
    </div>

    <script>
      function togglePassword() {
        const passInput = document.getElementById('password');
        const toggleBtn = document.querySelector('.toggle-password');
        if (passInput.type === 'password') {
          passInput.type = 'text';
          toggleBtn.textContent = 'Hide';
        } else {
          passInput.type = 'password';
          toggleBtn.textContent = 'Show';
        }
      }
    </script>
    <button type="submit" class="btn-submit">Register</button>
  </form>
  <p class="form-footer">Already have an account? <a href="login.php">Login here</a></p>
</div>
{% endblock %}
