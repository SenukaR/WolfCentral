<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Central</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .top-bar {
            background-color: transparent;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .top-bar img {
            height: 70px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
        }

        .bottom-section {
            background-color: #8c8c8c; /* darker grey */
            padding: 60px 20px; /* 50% taller than before */
            display: flex;
            justify-content: space-around;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
        }

        .bottom-section h3 {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <img src="titlelogo.png" alt="Wolf Central Logo">
        <div class="title">Wolf Central</div>
    </div>

    <div class="bottom-section">
        <h3>University of Wolverhampton</h3>
        <h3>Links</h3>
        <h3>Contact Us</h3>
    </div>

</body>
</html>
