{% block content %}
<div class="form-container" style="max-width: 600px; text-align: center;">
    <h2>Account Details</h2>
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">

    <img src="https://ui-avatars.com/api/?name={{ user.email }}&background=182d44&color=fff&size=120&rounded=true" 
         alt="Profile Avatar" 
         class="profile-avatar">

    <div class="profile-info" style="text-align: left; margin-top: 20px;">
        <p><strong>Student ID:</strong> {{ user.student_id }}</p>
        <p><strong>University Email:</strong> {{ user.email }}</p>
        <p><strong>Account Created:</strong> {{ user.created_at|date("d M Y") }}</p>
    </div>

    <div style="margin-top: 30px;">
        <a href="index.php" class="btn-submit" style="text-decoration: none; display: inline-block; width: auto; padding: 10px 20px;">Back to Home</a>
    </div>
</div>
{% endblock %}
